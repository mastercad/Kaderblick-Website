server {
    listen 80;
    server_name _;

    # nginx läuft als www-data; /var/lib/nginx/tmp gehört nginx → Permission denied.
    # /tmp ist für alle beschreibbar.
    client_body_temp_path /tmp/nginx_client_body;

    root /var/www/symfony/public;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Einziger PHP-Einstiegspunkt – alles andere liefert 404.
    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    # Upload-Größe passend zu PHP-Limits setzen
    client_max_body_size 51200M;

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}
