server {
    listen 80;
    root /usr/share/nginx/html;

    # Statische Dateien direkt ausliefern – KEIN SPA-Fallback.
    # Wenn nicht vorhanden → echter 404, kein index.html als Mimikry.
    location = /robots.txt {
        try_files $uri =404;
        add_header Content-Type "text/plain" always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /sitemap.xml {
        try_files $uri =404;
        add_header Content-Type "application/xml" always;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location / {
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        add_header Cross-Origin-Opener-Policy "unsafe-none" always;
    }
}
