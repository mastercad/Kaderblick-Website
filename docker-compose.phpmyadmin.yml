name: ${COMPOSE_PROJECT_NAME:-kaderblick}

services:
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: always
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "${PMA_PORT:-8082}:80"
    networks:
      - app-net

networks:
  app-net:
    name: ${COMPOSE_PROJECT_NAME:-}-kaderblick-net
