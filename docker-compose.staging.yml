# Staging-spezifische Overrides
# Verwendung: docker compose -f docker-compose.yml -f docker-compose.staging.yml -p staging up
#
# Zweck:
#   - Frontend-Image mit staging-spezifischer VITE_BACKEND_URL (staging-api.kaderblick.de)
#   - var/ liegt wie bei Production auf dem Container-Filesystem → bei --force-recreate
#     immer sauber, keine korrupten Zwischendateien aus fehlgeschlagenen Deployments.

services:
  frontend:
    # Staging-Image hat VITE_BACKEND_URL=https://staging-api.kaderblick.de eingebettet
    image: ghcr.io/mastercad/kaderblick/frontend-staging:${IMAGE_TAG:-latest}
