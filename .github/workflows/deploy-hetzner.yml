name: Deploy to Hetzner

# Reusable workflow – orchestriert prod / staging / demo als separate Jobs.
# Secrets werden pro Job via infisical-fetch aus Infisical geladen und
# stehen allen nachfolgenden Steps und Actions direkt als env.* zur Verfügung.

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        type: string
        required: true
      target:
        description: 'Ziel-Instanzen (prod/staging/demo, Kombinationen mit +)'
        type: string
        required: true
      release_timestamp:
        description: 'Release timestamp (YYYYMMDD_HHMMSS)'
        type: string
        required: true

jobs:
  # ============================================================
  # PREPARE – Release-Verzeichnisse anlegen, Dateien kopieren,
  #           DB + Maintenance-Container starten
  # ============================================================
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Fetch infrastructure secrets
        uses: ./.github/actions/infisical-fetch
        with:
          client-id:     ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          domain:        ${{ secrets.INFISICAL_URL }}
          env-slug:      global
          project-slug:  infrastructure-r-zu-j

      - name: Prepare release
        uses: ./.github/actions/prepare-release
        with:
          prod_dir:    production_releases/${{ inputs.release_timestamp }}
          staging_dir: staging_releases/${{ inputs.release_timestamp }}
          demo_dir:    demo_releases/${{ inputs.release_timestamp }}
          image_tag:   ${{ inputs.image_tag }}

  # ============================================================
  # DEPLOY PRODUCTION
  # ============================================================
  deploy-prod:
    name: Deploy Production
    needs: prepare
    if: contains(inputs.target, 'prod')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set release directory names
        id: dirs
        shell: bash
        run: |
          echo "prod_dir=production_releases/${{ inputs.release_timestamp }}"  >> $GITHUB_OUTPUT
          echo "staging_dir=staging_releases/${{ inputs.release_timestamp }}" >> $GITHUB_OUTPUT
          echo "demo_dir=demo_releases/${{ inputs.release_timestamp }}"       >> $GITHUB_OUTPUT

      - name: Fetch infrastructure secrets
        uses: ./.github/actions/infisical-fetch
        with:
          client-id:     ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          domain:        ${{ secrets.INFISICAL_URL }}
          env-slug:      global
          project-slug:  infrastructure-r-zu-j

      - name: Fetch production secrets
        uses: ./.github/actions/infisical-fetch
        with:
          client-id:     ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          domain:        ${{ secrets.INFISICAL_URL }}
          env-slug:      prod
          project-slug:  kaderblick-ny-in

      - name: Deploy production environment
        uses: ./.github/actions/deploy-env
        with:
          release_dir:                 ${{ steps.dirs.outputs.prod_dir }}
          current_link_name:           production_current
          app_env:                     prod
          decrypt_key_env:             prod
          vite_backend_url:            ${{ env.VITE_BACKEND_URL }}
          image_tag:                   ${{ inputs.image_tag }}
          frontend_image_suffix:       prod
          compose_files:               '-f docker-compose.yml'
          compose_project:             production
          maintenance_flag:            maintenance_production.flag
          rollback_file:               ${{ env.HETZNER_PROJECT_PATH }}/.rollback_to
          disable_maintenance_on_exit: 'false'

      - name: Production healthcheck
        uses: ./.github/actions/healthcheck
        with:
          url:             ${{ env.HEALTHCHECK_URL }}
          compose_project: production

      - name: Rollback production on failure
        if: failure()
        uses: ./.github/actions/rollback
        with:
          rollback_file:     ${{ env.HETZNER_PROJECT_PATH }}/.rollback_to
          current_link_name: production_current
          compose_project:   production
          compose_files:     '-f docker-compose.yml'

      - name: Healthcheck nach Rollback
        if: failure()
        uses: ./.github/actions/healthcheck
        with:
          url:             ${{ env.HEALTHCHECK_URL }}
          compose_project: production

      - name: Disable production maintenance
        if: always()
        uses: ./.github/actions/disable-maintenance
        with:
          maintenance_flag: maintenance_production.flag

  # ============================================================
  # DEPLOY STAGING
  # Läuft nach prod. Bei prod+staging: DB-Klon. Bei staging-only:
  # Datenbank wird nur sichergestellt.
  # ============================================================
  deploy-staging:
    name: Deploy Staging
    needs: [prepare, deploy-prod]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      (needs.deploy-prod.result == 'success' || needs.deploy-prod.result == 'skipped') &&
      contains(inputs.target, 'staging')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set release directory names
        id: dirs
        shell: bash
        run: |
          echo "prod_dir=production_releases/${{ inputs.release_timestamp }}"  >> $GITHUB_OUTPUT
          echo "staging_dir=staging_releases/${{ inputs.release_timestamp }}" >> $GITHUB_OUTPUT
          echo "demo_dir=demo_releases/${{ inputs.release_timestamp }}"       >> $GITHUB_OUTPUT

      - name: Fetch infrastructure secrets
        uses: ./.github/actions/infisical-fetch
        with:
          client-id:     ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          domain:        ${{ secrets.INFISICAL_URL }}
          env-slug:      global
          project-slug:  infrastructure-r-zu-j

      - name: Fetch staging secrets
        uses: ./.github/actions/infisical-fetch
        with:
          client-id:     ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          domain:        ${{ secrets.INFISICAL_URL }}
          env-slug:      staging
          project-slug:  kaderblick-ny-in

      - name: Clone production DB to staging
        if: contains(inputs.target, 'prod')
        uses: ./.github/actions/clone-db
        with:
          source_db: kaderblick
          target_db: kaderblick_staging
          db_root_password: ${{ env.MYSQL_ROOT_PASSWORD || 'root' }}

      - name: Ensure staging DB exists
        if: "!contains(inputs.target, 'prod')"
        uses: ./.github/actions/ensure-db
        with:
          db_name: kaderblick_staging
          db_root_password: ${{ env.MYSQL_ROOT_PASSWORD || 'root' }}

      - name: Deploy staging environment
        uses: ./.github/actions/deploy-env
        with:
          release_dir:           ${{ steps.dirs.outputs.staging_dir }}
          current_link_name:     staging_current
          app_env:               staging
          decrypt_key_env:       staging
          vite_backend_url:      ${{ env.VITE_BACKEND_URL }}
          google_redirect_uri:   ${{ env.GOOGLE_REDIRECT_URI }}
          frontend_url:          ${{ env.FRONTEND_URL }}
          image_tag:             ${{ inputs.image_tag }}
          frontend_image_suffix: staging
          compose_files:         '-f docker-compose.yml -f docker-compose.staging.yml'
          compose_project:       staging
          maintenance_flag:      maintenance_staging.flag

  # ============================================================
  # DEPLOY DEMO
  # ============================================================
  deploy-demo:
    name: Deploy Demo
    needs: prepare
    if: contains(inputs.target, 'demo')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set release directory names
        id: dirs
        shell: bash
        run: |
          echo "prod_dir=production_releases/${{ inputs.release_timestamp }}"  >> $GITHUB_OUTPUT
          echo "staging_dir=staging_releases/${{ inputs.release_timestamp }}" >> $GITHUB_OUTPUT
          echo "demo_dir=demo_releases/${{ inputs.release_timestamp }}"       >> $GITHUB_OUTPUT

      - name: Fetch infrastructure secrets
        uses: ./.github/actions/infisical-fetch
        with:
          client-id:     ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          domain:        ${{ secrets.INFISICAL_URL }}
          env-slug:      global
          project-slug:  infrastructure-r-zu-j

      - name: Fetch demo secrets
        uses: ./.github/actions/infisical-fetch
        with:
          client-id:     ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          domain:        ${{ secrets.INFISICAL_URL }}
          env-slug:      prod
          project-slug:  kaderblick-ny-in

      - name: Ensure demo DB exists
        uses: ./.github/actions/ensure-db
        with:
          db_name: kaderblick_demo
          db_root_password: ${{ env.MYSQL_ROOT_PASSWORD || 'root' }}

      - name: Deploy demo environment
        uses: ./.github/actions/deploy-env
        with:
          release_dir:           ${{ steps.dirs.outputs.demo_dir }}
          current_link_name:     demo_current
          app_env:               prod
          decrypt_key_env:       prod
          vite_backend_url:      ${{ env.VITE_BACKEND_URL }}
          google_redirect_uri:   ${{ env.GOOGLE_REDIRECT_URI }}
          frontend_url:          ${{ env.FRONTEND_URL }}
          image_tag:             ${{ inputs.image_tag }}
          frontend_image_suffix: demo
          compose_files:         '-f docker-compose.yml -f docker-compose.demo.yml'
          compose_project:       demo
          maintenance_flag:      maintenance_demo.flag

  # ============================================================
  # CLEANUP – Alte Releases löschen, Docker aufräumen
  # ============================================================
  cleanup:
    name: Cleanup
    needs: [prepare, deploy-prod, deploy-staging, deploy-demo]
    if: always() && needs.prepare.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Fetch infrastructure secrets
        uses: ./.github/actions/infisical-fetch
        with:
          client-id:     ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          domain:        ${{ secrets.INFISICAL_URL }}
          env-slug:      global
          project-slug:  infrastructure-r-zu-j

      - name: Cleanup releases and Docker resources
        uses: ./.github/actions/cleanup-releases
        with:
          keep: ${{ env.RELEASES_TO_KEEP }}
