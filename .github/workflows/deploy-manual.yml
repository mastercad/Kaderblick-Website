name: Manual Deploy to Instance

# Manuell ein bereits in GHCR vorhandenes Image auf eine oder mehrere Instanzen deployen.
# Nutzen: Feature testen, Präsentation vorbereiten, manueller Rollback auf Production.
#
# Voraussetzung: Das Image für den image_tag muss in GHCR existieren (aus einem
# vorherigen build.yml / CI-Lauf). Gültige Tags: Commit-SHA oder 'latest'.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag / Commit-SHA (muss in GHCR existieren)'
        type: string
        required: true
        default: 'latest'
      target:
        description: 'Ziel-Instanz(en) für das Deployment'
        type: choice
        required: true
        default: 'staging'
        options:
          - prod+staging+demo
          - prod+staging
          - prod
          - staging+demo
          - staging
          - demo

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
    with:
      image_tag: ${{ inputs.image_tag }}
      target: ${{ inputs.target }}
