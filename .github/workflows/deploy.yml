name: Deploy to Server

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        type: string
        default: 'latest'
      target:
        description: 'Ziel-Instanzen (prod/staging/demo, Kombinationen mit +)'
        type: string
        default: 'prod+staging+demo'
      deploy_alfahosting:
        description: 'Auf Alfahosting deployen'
        type: boolean
        default: false
      deploy_hetzner:
        description: 'Auf Hetzner deployen'
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (default: latest)'
        type: string
        default: 'latest'
      target:
        description: 'Ziel-Instanzen für das Deployment'
        type: choice
        default: 'prod+staging+demo'
        options:
          - prod+staging+demo
          - prod+staging
          - prod
          - staging+demo
          - staging
          - demo
      deploy_alfahosting:
        description: 'Auf Alfahosting deployen'
        type: boolean
        default: false
      deploy_hetzner:
        description: 'Auf Hetzner deployen'
        type: boolean
        default: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Alfahosting (Legacy-Server, standardmäßig deaktiviert) ──────────────────
  deploy-alfahosting:
    if: inputs.deploy_alfahosting != false
    uses: ./.github/workflows/deploy-alfahosting.yml
    with:
      image_tag: ${{ inputs.image_tag || github.sha }}
      target: ${{ inputs.target || 'prod+staging+demo' }}
    secrets: inherit

  # ── Hetzner (aktiver Server) ─────────────────────────────────────────────────
  deploy-hetzner:
    if: inputs.deploy_hetzner == true
    uses: ./.github/workflows/deploy-hetzner.yml
    with:
      image_tag: ${{ inputs.image_tag || github.sha }}
      target: ${{ inputs.target || 'prod+staging+demo' }}
    secrets: inherit

  # ── GHCR: SHA-Tag als :latest markieren ─────────────────────────────────────
  # Läuft nach beiden Server-Jobs (unabhängig ob einer geskippt wurde).
  # Setzt :latest nur wenn mindestens ein Server erfolgreich deployed hat.
  retag-latest:
    name: Tag SHA as :latest in GHCR
    needs: [deploy-alfahosting, deploy-hetzner]
    if: |
      always() &&
      contains(inputs.target, 'prod') &&
      (needs.deploy-hetzner.result == 'success' || needs.deploy-alfahosting.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Retag SHA → :latest
        run: |
          TAG="${{ inputs.image_tag || github.sha }}"
          for IMAGE in api frontend-prod frontend-staging frontend-demo maintenance; do
            docker pull ghcr.io/mastercad/kaderblick/${IMAGE}:${TAG}
            docker tag  ghcr.io/mastercad/kaderblick/${IMAGE}:${TAG} ghcr.io/mastercad/kaderblick/${IMAGE}:latest
            docker push ghcr.io/mastercad/kaderblick/${IMAGE}:latest
          done
