name: Deploy to Server

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        type: string
        default: 'latest'
      target:
        description: 'Ziel-Instanzen (prod/staging/demo, Kombinationen mit +)'
        type: string
        default: 'prod+staging+demo'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (default: latest)'
        type: string
        default: 'latest'
      target:
        description: 'Ziel-Instanzen für das Deployment'
        type: choice
        default: 'prod+staging+demo'
        options:
          - prod+staging+demo
          - prod+staging
          - prod
          - staging+demo
          - staging
          - demo

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-ids:
    name: Generate release IDs
    runs-on: ubuntu-latest
    outputs:
      release_timestamp: ${{ steps.ts.outputs.release_timestamp }}
    steps:
      - name: Generate timestamp
        id: ts
        run: echo "release_timestamp=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

  deploy-hetzner:
    needs: generate-ids
    uses: ./.github/workflows/deploy-hetzner.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
    with:
      image_tag:         ${{ inputs.image_tag || 'latest' }}
      target:            ${{ inputs.target || 'prod+staging+demo' }}
      release_timestamp: ${{ needs.generate-ids.outputs.release_timestamp }}
