name: Quality Assurance

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Docker image tag to test (muss in GHCR vorhanden sein).'
        type: string
        required: true
      is_pull_request:
        description: 'true wenn aus einem PR aufgerufen (aktiviert PR-Kommentare)'
        type: boolean
        default: false
      is_main_push:
        description: 'true wenn aus Push auf main aufgerufen (aktiviert Badge-Updates)'
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  #  Frontend Quality Assurance
  # ============================================================
  frontend-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Fetch infrastructure secrets
        uses: ./.github/actions/infisical-fetch
        with:
          client-id:     ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          domain:        ${{ secrets.INFISICAL_URL }}
          env-slug:      global
          project-slug:  infrastructure-r-zu-j

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Jest tests with coverage
        run: npm test -- --passWithNoTests --ci --forceExit --coverage --coverageReporters=json-summary --coverageReporters=text

      - name: Build verification
        run: npm run build

      - name: Jest Coverage Comment
        id: frontend-coverage
        if: inputs.is_pull_request
        uses: MishaKav/jest-coverage-comment@v1
        with:
          coverage-summary-path: frontend/coverage/coverage-summary.json
          title: "🎨 Frontend Test Coverage"

      - name: Extract frontend coverage percentage
        id: frontend-pct
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            PCT=$(node -e "const c=require('./coverage/coverage-summary.json');console.log(c.total.statements.pct)")
            echo "coverage=$PCT" >> $GITHUB_OUTPUT
          else
            echo "coverage=0" >> $GITHUB_OUTPUT
          fi

      - name: Update Frontend Coverage Badge
        if: inputs.is_main_push
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ env.GIST_TOKEN }}
          gistID: ${{ env.COVERAGE_GIST_ID }}
          filename: frontend-coverage.json
          label: Frontend Coverage
          message: "${{ steps.frontend-pct.outputs.coverage }}%"
          valColorRange: ${{ steps.frontend-pct.outputs.coverage }}
          minColorRange: 0
          maxColorRange: 100

  # ============================================================
  #  Backend Quality Assurance
  # ============================================================
  quality-assurance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Fetch infrastructure secrets
        uses: ./.github/actions/infisical-fetch
        with:
          client-id:     ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          domain:        ${{ secrets.INFISICAL_URL }}
          env-slug:      global
          project-slug:  infrastructure-r-zu-j

      - name: Fetch test secrets
        uses: ./.github/actions/infisical-fetch
        with:
          client-id:     ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          domain:        ${{ secrets.INFISICAL_URL }}
          env-slug:      test
          project-slug:  kaderblick-ny-in

      - name: Cache Composer vendors
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          
      - name: prepare Test Env
        run: |
          # prepare database container 

          cp api/.env.dist api/.env
          echo "APP_SECRET=${{ env.APP_SECRET }}" >> api/.env
          sed -i 's/^APP_ENV=.*/APP_ENV=test/' api/.env
          sed -i 's/^DATABASE_URL=.*/DATABASE_URL='kaderblick_test'/' api/.env

          docker network inspect kaderblick-net >/dev/null 2>&1 || docker network create kaderblick-net
          
          docker volume inspect kaderblick-data >/dev/null 2>&1 || docker volume create kaderblick-data

          if docker ps --filter "name=kaderblick-db" --filter "status=running" | grep -q kaderblick-db; then
            echo "DB Container läuft"
          else
            docker volume inspect kaderblick-db-data || docker volume create kaderblick-db-data
            docker compose -f docker-compose.db.yml up -d --build --force-recreate db
          fi
          
          # Warte auf DB-Container mit Timeout
          timeout=90
          elapsed=0
          while true; do
            status=`docker inspect -f {{.State.Health.Status}} kaderblick-db`
            
            case "$status" in
              "healthy")
                echo "DB Container ist bereit!"
                break
                ;;
              "unhealthy")
                echo "DB Container ist fehlerhaft - Details:"
                docker logs kaderblick-db
                docker inspect kaderblick-db
                exit 1
                ;;
              "starting")
                if [ "$elapsed" -ge "$timeout" ]; then
                  echo "Container startet zu lange (Timeout nach ${timeout}s) - Details:"
                  docker logs kaderblick-db
                  docker inspect kaderblick-db
                  exit 1
                fi
                ;;
              *)
                echo "Unerwarteter Status '$status' - Details:"
                docker logs kaderblick-db
                docker inspect kaderblick-db
                exit 1
                ;;
            esac
            
            echo "Warte auf DB-Container (${elapsed}/${timeout}s)... Status: $status"
            sleep 2
            elapsed=$((elapsed+2))
          done

          # Test-Datenbank und Rechte erstellen
          docker compose -f docker-compose.db.yml exec -T db mariadb -uroot -proot -e "
            CREATE DATABASE IF NOT EXISTS kaderblick_test;
            CREATE USER IF NOT EXISTS 'kaderblick'@'%' IDENTIFIED BY 'kaderblick';
            GRANT ALL PRIVILEGES ON kaderblick_test.* TO 'kaderblick'@'%';
            FLUSH PRIVILEGES;
          "

          # prevent creating directories instead of files when running docker compose exec with mounted current host directory
          touch ./api/.env.test.local
          touch ./api/.env.demo.local
          touch ./api/.env.staging.local
          touch ./api/.env.prod.local
          
          echo "${{ env.GHCR_TOKEN }}" | docker login ghcr.io -u mastercad --password-stdin
          docker pull ghcr.io/mastercad/kaderblick/api:test-${{ inputs.image_tag }}
          docker pull ghcr.io/mastercad/kaderblick/frontend-prod:${{ inputs.image_tag }}
          DATABASE_URL=kaderblick_test API_IMAGE_TAG=test-${{ inputs.image_tag }} IMAGE_TAG=${{ inputs.image_tag }} docker compose up -d --no-build --force-recreate api frontend

          mkdir -p api/config/secrets/test
          echo '${{ env.DECRYPT_KEY }}' | base64 -d > api/config/secrets/test/test.decrypt.private.php
          chmod 600 api/config/secrets/test/test.decrypt.private.php

          echo "Decrypt secrets"
          docker compose exec -T api bin/console secrets:decrypt-to-local --env=test --force
          echo "Decrypt secrets done"

          echo "Replace MAILER_DSN in decrypted secrets to avoid external SMTP calls during tests"
          docker compose exec -T api sh -c \
            'ls -lisa /var/www/symfony && sed -i "s|^MAILER_DSN=.*|MAILER_DSN=null://null|" /var/www/symfony/.env.test.local 2>/dev/null || true; echo "MAILER_DSN=null://null" >> /var/www/symfony/.env.test.local'

          mkdir -p "api/config/jwt"

          echo "Ensure JWT Keys"
          if [ ! -f api/config/jwt/private.pem ] || [ ! -f api/config/jwt/public.pem ]; then
            echo "Generate JWT Keys"
            docker compose exec -T api php bin/console lexik:jwt:generate-keypair --overwrite
          fi
          
          echo "Migrate Test DB"
          docker compose exec -T api bin/console doctrine:migrations:migrate --env=test

          echo "Load Fixtures"
          docker compose exec -T api bin/console doctrine:fixtures:load -n --env=test --group=master --group=test

      - name: run PHP-CS-Fixer
        run: docker compose exec -T api ./vendor/bin/php-cs-fixer --config=.php-cs-fixer.dist.php fix --dry-run --diff --ansi

      - name: run PHP-CS
        run: docker compose exec -T api ./vendor/bin/phpcs

      - name: run PHPStan
        run: docker compose exec -T api ./vendor/bin/phpstan analyse

      - name: run PHPUnit with coverage
        id: phpunit-coverage
        run: |
          set -o pipefail
          docker compose exec -T -e XDEBUG_MODE=coverage api ./vendor/bin/phpunit \
            --coverage-cobertura var/coverage-cobertura.xml \
            --coverage-text 2>&1 | tee phpunit-output.txt

          # Extract line coverage percentage
          COVERAGE=$(awk '/^  Lines:/ {gsub("%", "", $2); print $2; exit}' phpunit-output.txt)
          echo "coverage=${COVERAGE:-0}" >> $GITHUB_OUTPUT

          # Coverage-Datei aus Container auf den Runner kopieren
          mkdir -p api/var
          docker compose cp api:/var/www/symfony/var/coverage-cobertura.xml api/var/coverage-cobertura.xml

      - name: Generate Backend Coverage Report
        if: inputs.is_pull_request
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: api/var/coverage-cobertura.xml
          badge: true
          format: markdown
          output: both
          thresholds: '40 70'

      - name: Add Backend Coverage PR Comment
        if: inputs.is_pull_request
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: backend-coverage
          path: code-coverage-results.md

      - name: Update Backend Coverage Badge
        if: inputs.is_main_push
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ env.GIST_TOKEN }}
          gistID: ${{ env.COVERAGE_GIST_ID }}
          filename: backend-coverage.json
          label: Backend Coverage
          message: "${{ steps.phpunit-coverage.outputs.coverage }}%"
          valColorRange: ${{ steps.phpunit-coverage.outputs.coverage }}
          minColorRange: 0
          maxColorRange: 100
