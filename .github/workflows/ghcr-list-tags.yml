name: GHCR – Verfügbare Tags anzeigen

# Einmalig triggern wenn man wissen will welche Image-Tags in GHCR vorhanden sind,
# bevor man "Manual Deploy to Instance" mit einem konkreten image_tag startet.
# Ergebnis erscheint im Job Summary dieses Runs (Tab "Summary" in der Actions-UI).

on:
  workflow_dispatch:

jobs:
  list-tags:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Tags aus GHCR abrufen und anzeigen
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          VERSIONS=$(curl -sf \
            -H "Authorization: Bearer $GHCR_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages/container/kaderblick%2Fapi/versions?per_page=50")

          {
            echo "## Verfügbare Tags in GHCR (api-Image, letzte 50 Versionen)"
            echo ""
            echo "| Datum | Tags |"
            echo "|-------|------|"
            echo "$VERSIONS" \
              | jq -r '.[] | select(.metadata.container.tags | length > 0)
                            | "| \(.updated_at[:10]) | `\(.metadata.container.tags | join("` `"))` |"' \
              | sort -r
          } >> "$GITHUB_STEP_SUMMARY"
