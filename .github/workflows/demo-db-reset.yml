name: Demo DB Reset (täglich)

on:
  schedule:
    - cron: '0 0 * * *'   # Jeden Tag um 0:00 UTC
  workflow_dispatch:       # Manueller Start jederzeit möglich

concurrency:
  group: demo-db-reset
  cancel-in-progress: false

jobs:
  reset-demo-db:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Fetch infrastructure secrets
        uses: ./.github/actions/infisical-fetch
        with:
          client-id:     ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          domain:        ${{ secrets.INFISICAL_URL }}
          env-slug:      global
          project-slug:  infrastructure-r-zu-j

      - name: Fetch demo secrets
        uses: ./.github/actions/infisical-fetch
        with:
          client-id:     ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          domain:        ${{ secrets.INFISICAL_URL }}
          env-slug:      demo
          project-slug:  kaderblick-ny-in

      - name: Enable demo maintenance
        uses: appleboy/ssh-action@v1.2.5
        with:
          host:     ${{ env.HETZNER_HOST }}
          username: ${{ env.HETZNER_USER }}
          key:      ${{ env.HETZNER_SSH_KEY }}
          script: |
            touch "${{ env.HETZNER_PROJECT_PATH }}/maintenance_demo.flag"
            chmod 644 "${{ env.HETZNER_PROJECT_PATH }}/maintenance_demo.flag"

      - name: Stop demo worker before reset
        uses: appleboy/ssh-action@v1.2.5
        with:
          host:     ${{ env.HETZNER_HOST }}
          username: ${{ env.HETZNER_USER }}
          key:      ${{ env.HETZNER_SSH_KEY }}
          script: |
            DEMO_CURRENT="${{ env.HETZNER_PROJECT_PATH }}/demo_current"
            if [ -d "$DEMO_CURRENT" ]; then
              cd "$DEMO_CURRENT"
              docker compose -f docker-compose.yml -f docker-compose.demo.yml -p demo stop worker 2>/dev/null || true
            fi

      - name: Reset demo database
        uses: appleboy/ssh-action@v1.2.5
        with:
          host:            ${{ env.HETZNER_HOST }}
          username:        ${{ env.HETZNER_USER }}
          key:             ${{ env.HETZNER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            docker exec kaderblick-db mysql -uroot -p'${{ env.MYSQL_ROOT_PASSWORD || 'root' }}' \
              -e "DROP DATABASE IF EXISTS kaderblick_demo;"
            docker exec kaderblick-db mysql -uroot -p'${{ env.MYSQL_ROOT_PASSWORD || 'root' }}' \
              -e "CREATE DATABASE kaderblick_demo CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
            docker exec kaderblick-db mysql -uroot -p'${{ env.MYSQL_ROOT_PASSWORD || 'root' }}' \
              -e "GRANT ALL PRIVILEGES ON kaderblick_demo.* TO 'kaderblick'@'%'; FLUSH PRIVILEGES;"
            echo "Demo-DB zurückgesetzt."

      - name: Run migrations on demo
        uses: appleboy/ssh-action@v1.2.5
        with:
          host:            ${{ env.HETZNER_HOST }}
          username:        ${{ env.HETZNER_USER }}
          key:             ${{ env.HETZNER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd "${{ env.HETZNER_PROJECT_PATH }}/demo_current"
            docker compose -f docker-compose.yml -f docker-compose.demo.yml -p demo \
              exec -T --user www-data api \
              bin/console doctrine:migrations:migrate --no-interaction --env=demo
            echo "Migrationen auf Demo abgeschlossen."

      - name: Load fixtures on demo
        uses: appleboy/ssh-action@v1.2.5
        with:
          host:            ${{ env.HETZNER_HOST }}
          username:        ${{ env.HETZNER_USER }}
          key:             ${{ env.HETZNER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd "${{ env.HETZNER_PROJECT_PATH }}/demo_current"
            docker compose -f docker-compose.yml -f docker-compose.demo.yml -p demo \
              exec -T --user www-data api \
              bin/console doctrine:fixtures:load \
              --env=demo --no-interaction --group=master --group=demo
            echo "Fixtures auf Demo geladen."

      - name: Disable demo maintenance
        if: always()
        uses: appleboy/ssh-action@v1.2.5
        with:
          host:     ${{ env.HETZNER_HOST }}
          username: ${{ env.HETZNER_USER }}
          key:      ${{ env.HETZNER_SSH_KEY }}
          script: |
            rm -f "${{ env.HETZNER_PROJECT_PATH }}/maintenance_demo.flag"
