name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - 'frontend/package*.json'
  pull_request:
    paths:
      - 'frontend/package*.json'
  schedule:
    # Jeden Montag 07:00 Uhr – unabhängig von Commits
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  npm-audit:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Run npm audit
        working-directory: frontend
        # moderate und höher → Build schlägt fehl
        run: npm audit --omit=dev --audit-level=moderate
