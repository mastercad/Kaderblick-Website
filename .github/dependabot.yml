version: 2

updates:
  # Frontend npm-Pakete
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    # Minor- und Patch-Updates zusammenfassen → weniger PR-Lärm
    groups:
      mui:
        patterns:
          - "@mui/*"
      tiptap:
        patterns:
          - "@tiptap/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "react-router"
          - "react-router-dom"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vite-plugin-pwa"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-plugin-*"
      jest:
        patterns:
          - "jest"
          - "jest-*"
          - "@jest/*"
          - "ts-jest"
          - "@testing-library/*"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "frontend"

  # GitHub Actions selbst aktuell halten
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "github-actions"
