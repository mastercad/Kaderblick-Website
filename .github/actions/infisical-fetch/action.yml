name: 'Fetch Infisical Secrets'
description: 'Lädt Secrets aus einem Infisical-Projekt/Environment und exportiert sie in GITHUB_ENV.'

inputs:
  client-id:
    description: 'Infisical Machine Identity Client-ID'
    required: true
  client-secret:
    description: 'Infisical Machine Identity Client-Secret'
    required: true
  domain:
    description: 'Infisical-Instanz-URL (z.B. https://vault.byte-artist.de)'
    required: true
  env-slug:
    description: 'Infisical Environment-Slug (z.B. global, prod, staging, demo)'
    required: true
  project-slug:
    description: 'Infisical Projekt-Slug (z.B. infrastructure, kaderblick)'
    required: true

runs:
  using: composite
  steps:
    - uses: infisical/secrets-action@v1.0.16
      with:
        client-id:     ${{ inputs.client-id }}
        client-secret: ${{ inputs.client-secret }}
        domain:        ${{ inputs.domain }}
        env-slug:      ${{ inputs.env-slug }}
        project-slug:  ${{ inputs.project-slug }}
        export-type:   env
