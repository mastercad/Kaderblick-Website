name: 'Prepare Release'
description: >
  Legt Release-Verzeichnisse an, kopiert Compose-Dateien via SCP, klont für
  staging/demo, deployt JWT-Keys, richtet Symlinks ein, startet DB und
  Maintenance-Container. Liest SSH-Zugangsdaten aus env.* (gesetzt via infisical-fetch).

inputs:
  image_tag:
    description: 'Docker-Image-Tag der zu deployenden Version'
    required: true

outputs:
  prod_dir:
    description: 'Relativer Pfad des Production-Release-Verzeichnisses (ohne Projekt-Basis)'
    value: ${{ steps.dirs.outputs.prod_dir }}
  staging_dir:
    description: 'Relativer Pfad des Staging-Release-Verzeichnisses (ohne Projekt-Basis)'
    value: ${{ steps.dirs.outputs.staging_dir }}
  demo_dir:
    description: 'Relativer Pfad des Demo-Release-Verzeichnisses (ohne Projekt-Basis)'
    value: ${{ steps.dirs.outputs.demo_dir }}

runs:
  using: composite
  steps:
    - name: Generate release directory names
      id: dirs
      shell: bash
      run: |
        TIMESTAMP=$(date +%Y%m%d_%H%M%S)
        echo "prod_dir=production_releases/${TIMESTAMP}"    >> $GITHUB_OUTPUT
        echo "staging_dir=staging_releases/${TIMESTAMP}"   >> $GITHUB_OUTPUT
        echo "demo_dir=demo_releases/${TIMESTAMP}"         >> $GITHUB_OUTPUT

    - name: Prepare release files locally
      shell: bash
      run: |
        mkdir -p build/api/config build/frontend
        cp docker-compose.yml docker-compose.staging.yml docker-compose.demo.yml \
           docker-compose.db.yml docker-compose.maintenance.yml build/
        cp -r .docker build/
        cp api/.env.dist build/api/
        cp -r api/config/packages api/config/routes api/config/routes.yaml \
              api/config/services.yaml api/config/bundles.php build/api/config/ 2>/dev/null || true
        cp -r api/config/secrets build/api/config/ 2>/dev/null || true

    - name: Create release directories on server
      uses: appleboy/ssh-action@v1.2.5
      with:
        host:     ${{ env.HETZNER_HOST }}
        username: ${{ env.HETZNER_USER }}
        key:      ${{ env.HETZNER_SSH_KEY }}
        script: |
          set -e
          mkdir -p "${{ env.HETZNER_PROJECT_PATH }}/${{ steps.dirs.outputs.prod_dir }}"
          mkdir -p "${{ env.HETZNER_PROJECT_PATH }}/staging_releases"
          mkdir -p "${{ env.HETZNER_PROJECT_PATH }}/demo_releases"

    - name: Copy release files to server
      uses: appleboy/scp-action@v1.0.0
      with:
        host:             ${{ env.HETZNER_HOST }}
        username:         ${{ env.HETZNER_USER }}
        key:              ${{ env.HETZNER_SSH_KEY }}
        source:           "build/*"
        target:           "${{ env.HETZNER_PROJECT_PATH }}/${{ steps.dirs.outputs.prod_dir }}"
        strip_components: 1

    - name: Clone release dir for staging and demo
      uses: appleboy/ssh-action@v1.2.5
      with:
        host:     ${{ env.HETZNER_HOST }}
        username: ${{ env.HETZNER_USER }}
        key:      ${{ env.HETZNER_SSH_KEY }}
        script: |
          set -e
          cp -r "${{ env.HETZNER_PROJECT_PATH }}/${{ steps.dirs.outputs.prod_dir }}" "${{ env.HETZNER_PROJECT_PATH }}/${{ steps.dirs.outputs.staging_dir }}"
          cp -r "${{ env.HETZNER_PROJECT_PATH }}/${{ steps.dirs.outputs.prod_dir }}" "${{ env.HETZNER_PROJECT_PATH }}/${{ steps.dirs.outputs.demo_dir }}"

    - name: Deploy JWT keys to all release dirs
      uses: appleboy/ssh-action@v1.2.5
      with:
        host:     ${{ env.HETZNER_HOST }}
        username: ${{ env.HETZNER_USER }}
        key:      ${{ env.HETZNER_SSH_KEY }}
        script: |
          set -e
          ROOT_DIR="${{ env.HETZNER_PROJECT_PATH }}"
          for DIR in "${{ env.HETZNER_PROJECT_PATH }}/${{ steps.dirs.outputs.prod_dir }}" \
                     "${{ env.HETZNER_PROJECT_PATH }}/${{ steps.dirs.outputs.staging_dir }}" \
                     "${{ env.HETZNER_PROJECT_PATH }}/${{ steps.dirs.outputs.demo_dir }}"; do
            mkdir -p "$DIR/api/config/jwt"
            [ -d "$ROOT_DIR/api/config/jwt" ] && \
              cp -r "$ROOT_DIR/api/config/jwt/"* "$DIR/api/config/jwt/" 2>/dev/null || true
          done

    - name: Prepare shared uploads symlinks
      uses: appleboy/ssh-action@v1.2.5
      with:
        host:     ${{ env.HETZNER_HOST }}
        username: ${{ env.HETZNER_USER }}
        key:      ${{ env.HETZNER_SSH_KEY }}
        script: |
          set -e
          SHARED="${{ env.HETZNER_PROJECT_PATH }}/public/uploads"
          mkdir -p "$SHARED" && chmod -R 775 "$SHARED"
          for DIR in "${{ env.HETZNER_PROJECT_PATH }}/${{ steps.dirs.outputs.prod_dir }}" \
                     "${{ env.HETZNER_PROJECT_PATH }}/${{ steps.dirs.outputs.staging_dir }}" \
                     "${{ env.HETZNER_PROJECT_PATH }}/${{ steps.dirs.outputs.demo_dir }}"; do
            mkdir -p "$DIR/public"
            rm -rf "$DIR/public/uploads"
            ln -s "$SHARED" "$DIR/public/uploads"
          done

    - name: Prepare shared backups symlinks
      uses: appleboy/ssh-action@v1.2.5
      with:
        host:     ${{ env.HETZNER_HOST }}
        username: ${{ env.HETZNER_USER }}
        key:      ${{ env.HETZNER_SSH_KEY }}
        script: |
          set -e
          ROOT="${{ env.HETZNER_PROJECT_PATH }}"
          declare -A BACKUP_DIRS=(
            ["${{ env.HETZNER_PROJECT_PATH }}/${{ steps.dirs.outputs.prod_dir }}"]="$ROOT/backups"
            ["${{ env.HETZNER_PROJECT_PATH }}/${{ steps.dirs.outputs.staging_dir }}"]="$ROOT/staging_backups"
            ["${{ env.HETZNER_PROJECT_PATH }}/${{ steps.dirs.outputs.demo_dir }}"]="$ROOT/demo_backups"
          )
          for RELEASE_DIR in "${!BACKUP_DIRS[@]}"; do
            SHARED="${BACKUP_DIRS[$RELEASE_DIR]}"
            mkdir -p "$SHARED" && chmod 750 "$SHARED"
            rm -rf "$RELEASE_DIR/backups"
            ln -s "$SHARED" "$RELEASE_DIR/backups"
          done

    - name: Ensure DB container is running
      uses: appleboy/ssh-action@v1.2.5
      with:
        host:     ${{ env.HETZNER_HOST }}
        username: ${{ env.HETZNER_USER }}
        key:      ${{ env.HETZNER_SSH_KEY }}
        script: |
          set -e
          docker network inspect kaderblick-net    >/dev/null 2>&1 || docker network create kaderblick-net
          docker volume inspect kaderblick-data    >/dev/null 2>&1 || docker volume create kaderblick-data
          docker volume inspect kaderblick-db-data >/dev/null 2>&1 || docker volume create kaderblick-db-data
          if docker ps --filter "name=kaderblick-db" --filter "status=running" | grep -q kaderblick-db; then
            echo "DB läuft bereits."
          else
            COMPOSE_DIR="${{ env.HETZNER_PROJECT_PATH }}/production_current"
            [ -d "$COMPOSE_DIR" ] || COMPOSE_DIR="${{ env.HETZNER_PROJECT_PATH }}/${{ steps.dirs.outputs.prod_dir }}"
            docker compose -f "$COMPOSE_DIR/docker-compose.db.yml" -p kaderblick-db up -d db
            until docker exec kaderblick-db mysqladmin ping -uroot -p'${{ env.MYSQL_ROOT_PASSWORD || 'root' }}' --silent 2>/dev/null; do sleep 3; done
            echo "DB bereit."
          fi

    - name: Update maintenance container
      uses: appleboy/ssh-action@v1.2.5
      with:
        host:     ${{ env.HETZNER_HOST }}
        username: ${{ env.HETZNER_USER }}
        key:      ${{ env.HETZNER_SSH_KEY }}
        script: |
          set -e
          echo "${{ env.GHCR_TOKEN }}" | docker login ghcr.io -u mastercad --password-stdin
          docker pull ghcr.io/mastercad/kaderblick/maintenance:${{ inputs.image_tag }}
          IMAGE_TAG=${{ inputs.image_tag }} docker compose \
            -f "${{ env.HETZNER_PROJECT_PATH }}/${{ steps.dirs.outputs.prod_dir }}/docker-compose.maintenance.yml" \
            -p maintenance up -d --no-build --force-recreate
