name: 'Symfony Load Master Fixtures'
description: 'Lädt Doctrine-Master-Fixtures in die Datenbank.'

inputs:
  host:
    description: 'SSH-Host'
    required: true
  username:
    description: 'SSH-Benutzername (root)'
    required: true
  password:
    description: 'SSH-Passwort (alternativ zu key)'
    required: false
    default: ''
  key:
    description: 'SSH-Private-Key (alternativ zu password)'
    required: false
    default: ''
  env:
    description: 'Symfony-Umgebung (prod | staging)'
    required: true
  compose_project:
    description: 'Docker Compose Projektname (z. B. production | staging)'
    required: true
  compose_files:
    description: 'Docker Compose -f Flags als String'
    required: true
  work_dir:
    description: 'Absoluter Pfad zum Arbeitsverzeichnis auf dem Server'
    required: true
  command_timeout:
    description: 'SSH-Timeout'
    required: false
    default: '30m'
  database_url:
    description: 'Überschreibt DATABASE_URL in .env.{env}.local vor fixtures:load (Pflicht für Demo)'
    required: false
    default: ''
  fixture_groups:
    description: 'Komma-getrennte Fixture-Gruppen (z.B. "master,demo"). Default: master'
    required: false
    default: 'master'

runs:
  using: composite
  steps:
    - name: Load master fixtures (${{ inputs.env }})
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}
        key: ${{ inputs.key }}
        command_timeout: ${{ inputs.command_timeout }}
        script: |
          set -e
          cd "${{ inputs.work_dir }}"
          DC="docker compose ${{ inputs.compose_files }} -p ${{ inputs.compose_project }}"
          if [ -n "${{ inputs.database_url }}" ]; then
            $DC exec -T api sh -c \
              "sed -i 's|^DATABASE_URL=.*|DATABASE_URL=${{ inputs.database_url }}|' \
               /var/www/symfony/.env.${{ inputs.env }}.local"
            echo "DATABASE_URL in .env.${{ inputs.env }}.local auf Instanz-DB gesetzt."
          fi
          GROUP_FLAGS=""
          IFS=',' read -ra GROUPS <<< "${{ inputs.fixture_groups }}"
          for G in "${GROUPS[@]}"; do
            GROUP_FLAGS="$GROUP_FLAGS --group=${G// /}"
          done
          echo "=== Container-Status vor fixtures:load ==="
          $DC ps api 2>&1 || true
          echo "=== Starte fixtures:load ==="
          $DC exec -T --user www-data api \
            bin/console doctrine:fixtures:load \
            --env=${{ inputs.env }} --no-interaction --append $GROUP_FLAGS 2>&1
