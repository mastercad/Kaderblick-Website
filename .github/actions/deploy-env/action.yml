name: 'Deploy Environment'
description: >
  Schreibt .env + Decrypt-Key, schaltet Maintenance ein, setzt den current-Symlink,
  deployt Container, führt App-Setup + Fixtures aus und schaltet Maintenance aus.
  SSH-Zugangsdaten und Secrets werden aus env.* gelesen (gesetzt via infisical-fetch).

inputs:
  release_dir:
    description: 'Relativer Pfad zum neuen Release-Verzeichnis (ohne Projekt-Basis, z.B. production_releases/20260607_120000)'
    required: true
  current_link_name:
    description: 'Name des current-Symlinks (z.B. production_current, staging_current)'
    required: true
  app_env:
    description: 'Symfony APP_ENV (prod oder staging)'
    required: true
  decrypt_key_env:
    description: 'Unterordner unter config/secrets/ (prod oder staging)'
    required: true
  vite_backend_url:
    description: 'Wert für VITE_BACKEND_URL in frontend/.env'
    required: true
  google_redirect_uri:
    description: 'Überschreibt GOOGLE_REDIRECT_URI in api/.env (leer = kein Override)'
    required: false
    default: ''
  frontend_url:
    description: 'Überschreibt FRONTEND_URL in api/.env (leer = kein Override)'
    required: false
    default: ''
  image_tag:
    description: 'Docker-Image-Tag der zu deployenden Version'
    required: true
  frontend_image_suffix:
    description: 'Suffix des Frontend-Image (prod, staging oder demo)'
    required: true
  compose_files:
    description: 'Docker-Compose -f Flags (z.B. "-f docker-compose.yml -f docker-compose.staging.yml")'
    required: true
  compose_project:
    description: 'Docker-Compose Projektname (production, staging oder demo)'
    required: true
  extra_docker_env:
    description: 'Zusätzliche Env-Vars für docker compose up (z.B. "PMA_PORT=18082 API_PORT=18081")'
    required: false
    default: ''
  maintenance_flag:
    description: 'Dateiname der Maintenance-Flagge (z.B. maintenance_production.flag)'
    required: true
  disable_maintenance_on_exit:
    description: >
      Maintenance am Ende (auch bei Fehler) innerhalb dieser Action deaktivieren.
      Auf false setzen wenn der aufrufende Job die Maintenance selbst steuert (z.B. bei Rollback).
    required: false
    default: 'true'
  rollback_file:
    description: 'Pfad zur Rollback-Datei (speichert vorheriges Symlink-Ziel). Leer = kein Rollback-File.'
    required: false
    default: ''
  api_port:
    description: 'Port, auf dem die API erreichbar sein soll (für HEALTHCHECK_URL und extra_docker_env)'
    required: true
  react_port:
    description: 'Port, auf dem das Frontend erreichbar sein soll (für HEALTHCHECK_URL und extra_docker_env)'
    required: true
  healthcheck_url:
    description: 'URL für Healthchecks (z.B. http://localhost:18081/api/health) (für extra_docker_env)'
    required: true
  stripe_secret_key:
    description: 'Stripe Secret Key'
    required: true
  stripe_webhook_secret:
    description: 'Stripe Webhook Secret'
    required: true
  messenger_transport_dsn:
    description: 'Messenger Transport DSN'
    required: true
  rabbitmq_port:
    description: 'RabbitMQ Port'
    required: true
  rabbitmq_management_port:
    description: 'RabbitMQ Management Port'
    required: true
  rabbitmq_user:
    description: 'RabbitMQ User'
    required: true
  rabbitmq_password:
    description: 'RabbitMQ Password'
    required: true
  minio_port:
    description: 'MinIO Port'
    required: true
  minio_console_port:
    description: 'MinIO Console Port'
    required: true
  minio_root_user:
    description: 'MinIO Root User'
    required: true
  minio_root_password:
    description: 'MinIO Root Password'
    required: true
  document_staging_bucket:
    description: 'MinIO Bucket für Dokumente (staging)'
    required: true
  google_client_id:
    description: 'Client ID for Google Drive OAuth'
    required: true
  google_client_secret:
    description: 'Client Secret for Google Drive OAuth'
    required: true
  google_refresh_token:
    description: 'Refresh Token for Google Drive OAuth'
    required: true
  document_staging_access_key:
    description: 'Access Key for Document Staging (MinIO)'
    required: true
  document_staging_secret_key:
    description: 'Secret Key for Document Staging (MinIO)'
    required: true
  google_documents_folder_id:
    description: 'Google Drive Folder ID for storing documents'
    required: true 

runs:
  using: composite
  steps:
    - name: Prepare decrypt key
      id: prepare-key
      shell: bash
      run: |
        KEY_SUBDIR="${{ inputs.decrypt_key_env }}"
        KEY_FILE="/tmp/${KEY_SUBDIR}.decrypt.private.php"
        echo '${{ env.DECRYPT_KEY }}' | base64 -d > "$KEY_FILE"
        chmod 600 "$KEY_FILE"
        REMOTE_DIR="${{ env.HETZNER_PROJECT_PATH }}/${{ inputs.release_dir }}/api/config/secrets/${KEY_SUBDIR}"
        echo "key_file=$KEY_FILE"  >> $GITHUB_OUTPUT
        echo "key_dir=$REMOTE_DIR" >> $GITHUB_OUTPUT

    - name: Write .env
      uses: appleboy/ssh-action@v1.2.5
      with:
        host:     ${{ env.HETZNER_HOST }}
        username: ${{ env.HETZNER_USER }}
        key:      ${{ env.HETZNER_SSH_KEY }}
        script: |
          set -e
          RELEASE_DIR="${{ env.HETZNER_PROJECT_PATH }}/${{ inputs.release_dir }}"
          
          echo "RELEASE_DIR=$RELEASE_DIR"
          echo "Checking file: $RELEASE_DIR/api/.env.dist"

          echo "APP_ENV=${{ inputs.app_env }}"
          echo "FRONTEND_URL=${{ inputs.frontend_url }}"
          echo "GOOGLE_CLIENT_ID=${{ inputs.google_client_id }}"

          if [ -z "$RELEASE_DIR" ]; then
            echo "ERROR: RELEASE_DIR is empty. HETZNER_PROJECT_PATH='${{ env.HETZNER_PROJECT_PATH }}' inputs.release_dir='${{ inputs.release_dir }}'"
            exit 1
          fi

          ls -la "${{ env.HETZNER_PROJECT_PATH }}"
          ls -la "$RELEASE_DIR"
          ls -la "$RELEASE_DIR/api/.env.dist"
          
          set_env_var() {
            local file="$1"
            local key="$2"
            local value="$3"

            if [ -z "$value" ]; then
              return 0
            fi

            local escaped_value
            escaped_value=$(printf '%s' "$value" | sed 's/[&|]/\\&/g')

            if grep -q "^${key}=" "$file"; then
              sed -i "s|^${key}=.*|${key}=${escaped_value}|" "$file"
            else
              printf '\n%s=%s\n' "$key" "$value" >> "$file"
            fi
          }

          file="$RELEASE_DIR/api/.env"
          cp "$RELEASE_DIR/api/.env.dist" "$file"

          set_env_var "$file" "APP_ENV" "${{ inputs.app_env }}"
          set_env_var "$file" "GOOGLE_REDIRECT_URI" "${{ inputs.google_redirect_uri }}"
          set_env_var "$file" "FRONTEND_URL" "${{ inputs.frontend_url }}"
          set_env_var "$file" "STRIPE_SECRET_KEY" "${{ inputs.stripe_secret_key }}"
          set_env_var "$file" "STRIPE_WEBHOOK_SECRET" "${{ inputs.stripe_webhook_secret }}"
          set_env_var "$file" "GOOGLE_CLIENT_ID" "${{ inputs.google_client_id }}"
          set_env_var "$file" "GOOGLE_CLIENT_SECRET" "${{ inputs.google_client_secret }}"
          set_env_var "$file" "GOOGLE_REFRESH_TOKEN" "${{ inputs.google_refresh_token }}"
          set_env_var "$file" "GOOGLE_DOCUMENTS_FOLDER_ID" "${{ inputs.google_documents_folder_id }}"
          set_env_var "$file" "DOCUMENT_STAGING_ACCESS_KEY" "${{ inputs.document_staging_access_key }}"
          set_env_var "$file" "DOCUMENT_STAGING_SECRET_KEY" "${{ inputs.document_staging_secret_key }}"
          set_env_var "$file" "DOCUMENT_STAGING_BUCKET" "${{ inputs.document_staging_bucket }}"
          set_env_var "$file" "MESSENGER_TRANSPORT_DSN" "${{ inputs.messenger_transport_dsn }}"
          set_env_var "$file" "APP_DEBUG" "${{ 0 }}"
          set_env_var "$file" "APP_SECRET" "${{ env.APP_SECRET }}"
          set_env_var "$file" "ADMIN_ALERT_EMAIL" "${{ env.ADMIN_ALERT_EMAIL }}"
          set_env_var "$file" "APP_SECRET" "${{ inputs.vite_backend_url }}"

          cat "$RELEASE_DIR/api/.env"

          file="$RELEASE_DIR/frontend/.env"
          set_env_var "$file" "APP_SECRET" "${{ inputs.vite_backend_url }}"

          touch "$RELEASE_DIR/api/.env.prod.local"
          touch "$RELEASE_DIR/api/.env.staging.local"
  
          mkdir -p "${{ steps.prepare-key.outputs.key_dir }}"

    - name: Deploy decrypt key
      uses: appleboy/scp-action@v1.0.0
      with:
        host:             ${{ env.HETZNER_HOST }}
        username:         ${{ env.HETZNER_USER }}
        key:              ${{ env.HETZNER_SSH_KEY }}
        source:           ${{ steps.prepare-key.outputs.key_file }}
        target:           ${{ steps.prepare-key.outputs.key_dir }}
        strip_components: 1

    - name: Set decrypt key permissions
      uses: appleboy/ssh-action@v1.2.5
      with:
        host:     ${{ env.HETZNER_HOST }}
        username: ${{ env.HETZNER_USER }}
        key:      ${{ env.HETZNER_SSH_KEY }}
        script: |
          chmod 644 "${{ steps.prepare-key.outputs.key_dir }}"/*.php

    - name: Enable maintenance
      uses: appleboy/ssh-action@v1.2.5
      with:
        host:     ${{ env.HETZNER_HOST }}
        username: ${{ env.HETZNER_USER }}
        key:      ${{ env.HETZNER_SSH_KEY }}
        script: |
          touch "${{ env.HETZNER_PROJECT_PATH }}/${{ inputs.maintenance_flag }}"
          chmod 644 "${{ env.HETZNER_PROJECT_PATH }}/${{ inputs.maintenance_flag }}"

    - name: Set current symlink
      uses: appleboy/ssh-action@v1.2.5
      with:
        host:     ${{ env.HETZNER_HOST }}
        username: ${{ env.HETZNER_USER }}
        key:      ${{ env.HETZNER_SSH_KEY }}
        script: |
          set -e
          CURRENT="${{ env.HETZNER_PROJECT_PATH }}/${{ inputs.current_link_name }}"
          ROLLBACK_FILE="${{ inputs.rollback_file }}"
          if [ -n "$ROLLBACK_FILE" ]; then
            # Vorherigen Symlink-Pfad und zugehörigen IMAGE_TAG sichern (Zeile 1 + 2)
            PREV_PATH=$(readlink "$CURRENT" 2>/dev/null || echo "")
            PREV_TAG=$(cat "${ROLLBACK_FILE}.image_tag" 2>/dev/null || echo "")
            printf '%s\n%s\n' "$PREV_PATH" "$PREV_TAG" > "$ROLLBACK_FILE"
          fi
          ln -sfn "${{ env.HETZNER_PROJECT_PATH }}/${{ inputs.release_dir }}" "$CURRENT"
          if [ -n "$ROLLBACK_FILE" ]; then
            # Aktuellen IMAGE_TAG für nächsten möglichen Rollback persistieren
            echo "${{ inputs.image_tag }}" > "${ROLLBACK_FILE}.image_tag"
          fi
          mkdir -p "$CURRENT/api/var/cache" "$CURRENT/api/var/log"

    - name: Deploy containers
      uses: appleboy/ssh-action@v1.2.5
      with:
        host:            ${{ env.HETZNER_HOST }}
        username:        ${{ env.HETZNER_USER }}
        key:             ${{ env.HETZNER_SSH_KEY }}
        command_timeout: 30m
        script: |
          set -e
          cd "${{ env.HETZNER_PROJECT_PATH }}/${{ inputs.current_link_name }}"
          echo "${{ env.GHCR_TOKEN }}" | docker login ghcr.io -u mastercad --password-stdin
          docker pull ghcr.io/mastercad/kaderblick/api:${{ inputs.image_tag }}
          docker pull ghcr.io/mastercad/kaderblick/frontend-${{ inputs.frontend_image_suffix }}:${{ inputs.image_tag }}

          docker compose ${{ inputs.compose_files }} -p ${{ inputs.compose_project }} \
            down --remove-orphans --stop-timeout 10 api frontend worker minio-init minio rabbitmq 2>/dev/null || true
          
          sleep 2

          ${{ inputs.extra_docker_env }} \
          API_PORT=${{ env.API_PORT }} \
          REACT_PORT=${{ env.REACT_PORT }} \
          RABBITMQ_PORT=${{ env.RABBITMQ_PORT }} \
          RABBITMQ_MANAGEMENT_PORT=${{ env.RABBITMQ_MANAGEMENT_PORT }} \
          RABBITMQ_USER=${{ env.RABBITMQ_USER }} \
          RABBITMQ_PASSWORD=${{ env.RABBITMQ_PASSWORD }} \
          MINIO_PORT=${{ env.MINIO_PORT }} \
          MINIO_CONSOLE_PORT=${{ env.MINIO_CONSOLE_PORT }} \
          MINIO_ROOT_USER=${{ env.MINIO_ROOT_USER }} \
          MINIO_ROOT_PASSWORD=${{ env.MINIO_ROOT_PASSWORD }} \
          DOCUMENT_STAGING_BUCKET=${{ env.DOCUMENT_STAGING_BUCKET }} \
          HEALTHCHECK_URL=${{ env.HEALTHCHECK_URL }} \
          IMAGE_TAG=${{ inputs.image_tag }} API_IMAGE_TAG=${{ inputs.image_tag }} \
          MESSENGER_TRANSPORT_DSN=amqp://${{ env.RABBITMQ_USER }}:${{ env.RABBITMQ_PASSWORD }}@kaderblick-rabbitmq:${{ env.RABBITMQ_PORT }}/%2f \
          XDEBUG_MODE=off \
          HOST_UID=${{ env.HOST_UID }} HOST_GID=${{ env.HOST_GID }} \
          docker compose ${{ inputs.compose_files }} -p ${{ inputs.compose_project }} \
            up -d --no-build --force-recreate api frontend worker minio-init minio rabbitmq

    - name: App setup – secrets / cache / migrations / JWT
      uses: ./.github/actions/symfony-app-setup
      with:
        host:              ${{ env.HETZNER_HOST }}
        username:          ${{ env.HETZNER_USER }}
        key:               ${{ env.HETZNER_SSH_KEY }}
        env:               ${{ inputs.app_env }}
        compose_project:   ${{ inputs.compose_project }}
        compose_files:     ${{ inputs.compose_files }}
        work_dir:          ${{ env.HETZNER_PROJECT_PATH }}/${{ inputs.current_link_name }}
        main_project_path: ${{ env.HETZNER_PROJECT_PATH }}

    - name: Load master fixtures
      uses: ./.github/actions/symfony-load-fixtures
      with:
        host:            ${{ env.HETZNER_HOST }}
        username:        ${{ env.HETZNER_USER }}
        key:             ${{ env.HETZNER_SSH_KEY }}
        env:             ${{ inputs.app_env }}
        compose_project: ${{ inputs.compose_project }}
        compose_files:   ${{ inputs.compose_files }}
        work_dir:        ${{ env.HETZNER_PROJECT_PATH }}/${{ inputs.current_link_name }}

    - name: Disable maintenance
      if: always() && inputs.disable_maintenance_on_exit == 'true'
      uses: appleboy/ssh-action@v1.2.5
      with:
        host:     ${{ env.HETZNER_HOST }}
        username: ${{ env.HETZNER_USER }}
        key:      ${{ env.HETZNER_SSH_KEY }}
        script: |
          rm -f "${{ env.HETZNER_PROJECT_PATH }}/${{ inputs.maintenance_flag }}"
