security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # iCal-Feeds sind öffentlich – Authentifizierung erfolgt via token im URL
        ical:
            pattern: ^/ical/
            stateless: true
            security: false

#        login:
#            pattern: ^/api/login
#            stateless: true
#            json_login:
#                check_path: /api/login
#                username_path: email
#                password_path: password
#                success_handler: lexik_jwt_authentication.handler.authentication_success
#                failure_handler: lexik_jwt_authentication.handler.authentication_failure
#            user_checker: App\Security\UserChecker
#            provider: app_user_provider 

        api:
            pattern: ^/api
            stateless: true
            entry_point: App\Security\Json401EntryPoint
            jwt: ~
            custom_authenticators:
                - App\Security\ApiTokenAuthenticator

        # kein jwt, kein authenticator
        verify_email:
            pattern: ^/api/verify/email
            stateless: true
            provider: app_user_provider
            security: false

        main:
            stateless: true
            provider: app_user_provider
            jwt: ~
            custom_authenticators:
                - App\Security\GoogleAuthenticator
                - App\Security\ApiTokenAuthenticator
#            logout:
#                path: /api/logout
#                invalidate_session: true
            entry_point: App\Security\Json401EntryPoint

    role_hierarchy:
        ROLE_GUEST:       []
        ROLE_USER:        [ROLE_GUEST]
        ROLE_SUPPORTER:   [ROLE_USER]
        ROLE_CLUB:        [ROLE_SUPPORTER]
        ROLE_ADMIN:       [ROLE_CLUB]
        ROLE_SUPERADMIN:  [ROLE_ADMIN]

    access_control:
    - { path: ^/connect/google, roles: PUBLIC_ACCESS }
    - { path: ^/connect/google/check, roles: PUBLIC_ACCESS }
    - { path: ^/aktuelles, roles: PUBLIC_ACCESS }
    - { path: ^/news-sitemap\.xml$, roles: PUBLIC_ACCESS }
    - { path: ^/admin,        roles: ROLE_ADMIN }
    - { path: ^/news,         roles: ROLE_USER }
    - { path: ^/api/public/platform-news, roles: PUBLIC_ACCESS }
    # 2FA verify is public — the pending token acts as the credential
    - { path: ^/api/2fa/verify, roles: PUBLIC_ACCESS }
    # Email OTP send-login-code is public — pending token acts as the credential
    - { path: ^/api/2fa/email/send-login-code, roles: PUBLIC_ACCESS }
    - { path: ^/api/2fa,      roles: ROLE_USER }
    - { path: ^/api/users,    roles: ROLE_USER }
    - { path: ^/api/messages/unread-count, roles: ROLE_USER }
    - { path: ^/api/messages, roles: ROLE_USER }
    - { path: ^/api/message-groups, roles: ROLE_USER }
    - { path: ^/api/profile,  roles: ROLE_USER }
    - { path: ^/api/players,  roles: ROLE_USER }
    - { path: ^/api/notifications, roles: ROLE_USER }
    - { path: ^/api/push,     roles: ROLE_USER }
    - { path: ^/api/about-me,  roles: PUBLIC_ACCESS }
    - { path: ^/api/health,   roles: PUBLIC_ACCESS }
    - { path: ^/api/register, roles: PUBLIC_ACCESS }
    - { path: ^/api/login,    roles: PUBLIC_ACCESS }
    - { path: ^/api/verify,   roles: PUBLIC_ACCESS }
    - { path: ^/api/security/lock-account,    roles: PUBLIC_ACCESS }
    - { path: ^/api/security/request-unlock,  roles: PUBLIC_ACCESS }
    - { path: ^/api/security/unlock-account,  roles: PUBLIC_ACCESS }
