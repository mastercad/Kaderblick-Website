# name: kaderblick-infrastructure

# Optional shared infrastructure for local/self-hosted deployments.
services:
  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-kaderblick}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secret}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      app-net:
        aliases: 
          - kaderblick-rabbitmq

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-kaderblick}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      app-net:
        aliases: 
          - kaderblick-minio

  minio-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set local http://kaderblick-minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing "local/$${DOCUMENT_BUCKET}" &&
        mc anonymous set none "local/$${DOCUMENT_BUCKET}" &&
        (mc ilm rule add --expire-days 7 "local/$${DOCUMENT_BUCKET}" || true)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-kaderblick}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
      DOCUMENT_BUCKET: ${DOCUMENT_BUCKET:-kaderblick-documents-development}
    networks:
      - app-net

volumes:
  rabbitmq-data:
  minio-data:

networks:
  app-net:
    name: ${COMPOSE_PROJECT_NAME:-}-kaderblick-net
